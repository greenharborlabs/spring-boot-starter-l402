name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Verify release version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GRADLE_VERSION=$(grep -oP '^version=\K.*' gradle.properties)
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match gradle.properties version ($GRADLE_VERSION)"
            exit 1
          fi
          if [[ "$GRADLE_VERSION" == *-SNAPSHOT ]]; then
            echo "::error::Cannot release a SNAPSHOT version"
            exit 1
          fi

      - name: Build
        run: ./gradlew build

      - name: Publish to Sonatype
        run: ./gradlew publishAllPublicationsToSonatypeRepository
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
